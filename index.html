<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Walking Gate System</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    color:#333;
}

.card{
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    background:#f2f2f2;
    font-size:20px;
}

.status{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.open{
    background:#28a745;
}

.close{
    background:#dc3545;
}
</style>
</head>

<body>

<div class="container">

<h1>🚪 Smart Walking Gate</h1>

<div class="card">
📏 Distance
<h2 id="distance">-- cm</h2>
</div>

<div class="card">
📡 Relay Status
<h2 id="relay">--</h2>
</div>

<div id="gateCard" class="status close">
🚪 GATE CLOSED
</div>

</div>

<script>

async function getData(){

const url="https://api.thingspeak.com/channels/3417082/feeds/last.json";

try{

const response=await fetch(url);
const data=await response.json();

let distance=parseFloat(data.field1);

document.getElementById("distance").innerHTML=distance.toFixed(1)+" cm";

if(distance<=20){

document.getElementById("relay").innerHTML="🟢 ON";

document.getElementById("gateCard").innerHTML="🚪 GATE OPEN";

document.getElementById("gateCard").className="status open";

}
else{

document.getElementById("relay").innerHTML="🔴 OFF";

document.getElementById("gateCard").innerHTML="🚪 GATE CLOSED";

document.getElementById("gateCard").className="status close";

}

}
catch(e){

console.log(e);

}

}

getData();

setInterval(getData,5000);

</script>

</body>
</html>
