<!DOCTYPE html>
<html>
<head>
<title>Smart Parking ESP32</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#f2f2f2;
}

.card{
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    color:white;
    font-size:25px;
    transition:0.5s;
}
</style>
</head>

<body>

<h1>🚗 Smart Parking System</h1>

<div id="statusBox" class="card">Loading...</div>

<p id="distance">Distance: -- cm</p>

<script>

const channelID = "3417082";
const apiKey = "XV2VNM793K4BMYDD";

function update(){

fetch(`https://api.thingspeak.com/channels/3417082/feeds.json?api_key=XV2VNM793K4BMYDD&results=2`)
.then(res => res.json())
.then(data => {

let status = data.field1;   // 0 or 1 (car status)
let distance = data.field2; // ultrasonic value

let box = document.getElementById("statusBox");

document.getElementById("distance").innerHTML =
"Distance: " + distance + " cm";

if(status == 1){
    box.style.background = "red";
    box.innerHTML = "🚗 Car Detected - Gate OPEN";
}
else{
    box.style.background = "green";
    box.innerHTML = "🅿️ Parking Empty - Gate CLOSED";
}

});

}

update();
setInterval(update, 3000);

</script>

</body>
</html>
